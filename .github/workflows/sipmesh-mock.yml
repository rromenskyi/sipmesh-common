name: sipmesh-mock

# Build + publish the sipmesh-mock docker image.
#
# Triggers:
#   - push to any `v*` tag → publish ghcr.io/<owner>/sipmesh-mock:<tag>
#     + :latest (latest tracks the most-recent release tag)
#   - push to main → publish ghcr.io/<owner>/sipmesh-mock:main
#     (rolling tag for downstream "live with what's on main" stands)
#   - pull_request → build + test only, no push (validates the
#     Dockerfile changes still build under buildx)
#
# Multi-arch: linux/amd64 + linux/arm64. Frontend test stands run on
# both x86 CI runners (GitHub Actions default) and arm64 dev laptops
# (Apple Silicon).
#
# Why a dedicated workflow rather than a single "release" pipeline:
# the mock image's release cadence tracks sipmesh-common's tag
# cadence directly (each tag of the proto schema = new mock image),
# but the mock's docker artefact is the only thing pushed — the
# Go module itself is consumed via `go get` from the git tag, which
# the language toolchain handles natively.

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'cmd/sipmesh-mock/**'
      - 'deploy/Dockerfile.sipmesh-mock'
      - 'validate/**'
      - 'gen/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/sipmesh-mock.yml'
  pull_request:
    paths:
      - 'cmd/sipmesh-mock/**'
      - 'deploy/Dockerfile.sipmesh-mock'
      - 'validate/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sipmesh-mock

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build + test as a smoke check before docker work. Cheap
      # (validate + mock together are sub-second) and catches the
      # "the Go code is broken but Docker hides it" failure mode.
      - name: go test
        run: go test ./validate/ ./cmd/sipmesh-mock/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag rules:
      #   - on a vX.Y.Z push tag → publish that tag + :latest
      #   - on main → :main
      #   - PR → no push, just build to validate
      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          tags=""
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag_ref="${GITHUB_REF#refs/tags/}"
            tags="${REGISTRY}/${IMAGE_NAME}:${tag_ref}"
            tags="${tags},${REGISTRY}/${IMAGE_NAME}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            tags="${REGISTRY}/${IMAGE_NAME}:main"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.sipmesh-mock
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=sipmesh-mock — in-memory OperatorAPI gRPC server for frontend test stands
            org.opencontainers.image.licenses=
          cache-from: type=gha
          cache-to: type=gha,mode=max

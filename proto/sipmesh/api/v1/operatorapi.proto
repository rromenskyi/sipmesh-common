syntax = "proto3";

// OperatorAPI is the public sipmesh control surface — the contract
// frontend consoles, operator dashboards, and programmatic clients
// (sipmesh-frontend's PlaceCall, future bots, CI tooling) consume.
//
// Internal services (Admin, Config, ProxyControl, SipTrace, Edge,
// Pipeline, Registry, Scheduler) remain registered on their existing
// pods but are implementation details that may evolve / re-shard /
// rename without notice. Public consumers MUST go through OperatorAPI.
//
// Hosting: registered on media-server's existing admin gRPC listener
// (chart default :50070). One pod, one Service, one Ingress in front
// (Traefik + cert-manager + oauth2-proxy in production).
//
// Auth: same Bearer SIPMESH_API_KEY interceptor used everywhere else.
//
// Atomic deploy: ApplyOperatorConfig is the bulk-write entry point.
// Frontend builds a complete OperatorConfig (trunks + routes +
// pipelines), pushes it as one transaction. Server validates the
// whole graph — every route's `trunk` cross-references must resolve;
// every flow named in a route's `pipeline` must exist; codec lists
// validated against the binary's compiled-in registry; etc — BEFORE
// writing anything. Either everything lands or nothing does.
// Optimistic concurrency via parent_version protects against the
// "two operators editing the same UI at once" lost-update race.

// Separate proto package from `sipmesh.v1` — internal services
// (Admin, Config, ProxyControl, etc) evolve at sipmesh.v1; this
// public surface evolves at sipmesh.api.v1 independently. Nothing
// here references internal-package messages — the public contract
// owns its own message types.
package sipmesh.api.v1;

option go_package = "github.com/rromenskyi/sipmesh-common/gen/go/sipmesh/api/v1;sipmeshapiv1";

// Imports kept self-contained for now — every operator-shaped message
// is defined here. If we ever need to reference internal service
// messages (e.g. WorkerSummary from Admin), do that via a thin
// projection here, NOT a transitive proto import — keeps the public
// surface independent of internal proto churn.

// ============================================================
// Atomic config — the centrepiece for the frontend constructor
// ============================================================

// OperatorConfig is the complete operator-supplied configuration
// graph. Every resource that's currently spread across trunks.yaml,
// flows.yaml, and the in-cluster ConfigSet store is captured here
// as one strongly-typed object. Frontend's "constructor" UI holds
// an in-memory OperatorConfig, edits it field-by-field, and pushes
// it whole via ApplyOperatorConfig.
message OperatorConfig {
  // Carrier and inbound trunks. Order is irrelevant — trunks are
  // looked up by Trunk.id elsewhere in the graph.
  repeated Trunk trunks = 1;
  // Inbound routing — every incoming INVITE on a trunk gets routed
  // to one of these matchers (first match wins; routes are scanned
  // in order, so put more-specific matches first).
  repeated Route routes = 2;
  // Call flows / pipelines (say + listen + converse + dial + bridge
  // + hangup composition). Referenced from Route.pipeline by name.
  repeated Pipeline pipelines = 3;
  // ConfigSet bookkeeping — populated by the server on read,
  // ignored on write (server stamps a fresh version every Apply).
  // Frontend echoes back what it last read into ApplyRequest's
  // parent_version for optimistic concurrency.
  uint64 version    = 100;
  string applied_by = 101;
  // Server-generated apply timestamp (RFC 3339 string for now —
  // proto well-known Timestamp would need an import we're
  // postponing while the rest of the proto stays self-contained).
  string applied_at_iso = 102;
}

message GetOperatorConfigRequest {}

message OperatorConfigResponse {
  OperatorConfig config = 1;
}

// =============================================================
// WriteConfig — THE write surface for the operator console
// =============================================================
//
// One method covers every config mutation: upsert/delete pipeline,
// upsert/delete trunk, replace route list. Future resource types
// (users, AOR auth, ACL, AI-worker-pool, voicemail, etc.) extend
// ConfigOp's oneof additively — never a new RPC method.
//
// Semantics:
//
//   1. Load live ConfigSet body, parse into in-memory bundle.
//   2. Apply every ConfigOp in `ops` order into the bundle copy.
//   3. Validate the FULL merged result (cross-refs included:
//      route→trunk, route→pipeline, sub_pipeline refs, codec
//      lists vs binary registry, etc).
//   4. proto.Equal(before, after) → no_op=true, current version,
//      no write.
//   5. configstore.Apply(merged, parent_version):
//        - parent_version mismatch → ABORTED + new_version in
//          response so the BFF can refetch and retry
//        - validation failed → INVALID_ARGUMENT + diagnostics
//   6. The whole batch is atomic: either every op lands or
//      nothing does.
//
// Dependency-tree safety: validation runs on the fully-merged
// state, so a batch can include both `{ upsert_trunk: T,
// replace_routes: [Route{trunk:T.id}] }` even though Route refers
// to T which didn't exist before the batch — final state has T,
// validation passes.
//
// OCC: parent_version is the version returned by the LAST read
// (GetOperatorConfig or a previous WriteConfig). 0 is rejected
// for routine writes; for first-time bootstrap on an empty
// configstore, the dedicated `ImportConfig` method below skips
// OCC explicitly.

message WriteConfigRequest {
  // Multi-tenant routing key. Empty in single-tenant deploys (the
  // engine treats empty as the "default" group). Reserved as the
  // first field so multi-tenant adoption is a populate-the-field
  // change, not a wire-shape change.
  string group = 1;

  // Optimistic concurrency. Pass the version returned by the last
  // read (GetOperatorConfig or a previous WriteConfig). The
  // engine rejects writes whose parent_version doesn't match the
  // current ConfigSet version with ABORTED — the BFF SDK refetches
  // and retries up to a bounded number of times.
  //
  // 0 is rejected — use ImportConfig for first-time bootstrap.
  uint64 parent_version = 2;

  // The batch. Every op is applied to the bundle copy in order;
  // validation runs ONCE against the final merged state. An empty
  // ops list returns no_op=true with the current version.
  repeated ConfigOp ops = 3;

  // Audit string ("alice via console", "ci-cd nightly", etc).
  // Recorded on the resulting OperatorConfig.applied_by.
  string applied_by = 4;

  // Operator-readable why ("rotated zadarma password", "MVP0
  // launch trunk set", etc). Stored alongside applied_by so
  // future audit-log views can render context. Optional.
  string change_note = 5;

  // dry_run: run the full merge + validate pipeline, then return
  // the would-be diff and any diagnostics WITHOUT writing. The
  // current version stays unchanged; response.version echoes the
  // current value so the caller can retry as a real write with
  // the same parent_version.
  bool dry_run = 6;
}

// ConfigOp is one mutation. Every supported resource type has its
// own oneof variant. The oneof is the future-proofing seam — new
// resource types add a new variant (numbered additively) without
// touching the request envelope.
message ConfigOp {
  oneof op {
    // Upsert a Pipeline by Pipeline.name. Replaces the existing
    // pipeline wholesale; no PATCH/FieldMask merge on the server.
    Pipeline upsert_pipeline = 1;

    // Upsert a Trunk by Trunk.id. Wholesale replace.
    Trunk upsert_trunk = 2;

    // Replace the entire ordered route list. Routes have no stable
    // ID, so individual upsert isn't meaningful — the caller sends
    // the new desired list.
    RouteList replace_routes = 3;

    // Delete a Pipeline by name. Errors if any remaining route /
    // sub_pipeline / DialStep references it (caught by the post-
    // merge validation pass).
    string delete_pipeline = 4;

    // Delete a Trunk by id. Errors if any remaining route
    // references it.
    string delete_trunk = 5;

    // Future variants: User (6), AORAuth (7), ACL (8),
    // AIWorkerPool (9), VoicemailBox (10), … reserved by
    // convention. Always add additively, never renumber.
  }

  // Reserved for future per-op FieldMask-style partial replace.
  // Today every variant is a wholesale resource swap. If a
  // programmatic client ever needs to flip a single field
  // without re-fetching nested secrets, this slot becomes a
  // FieldMask without breaking existing callers.
  reserved 100;
  reserved "field_mask";
}

// RouteList is the payload for ConfigOp.replace_routes — a
// thin wrapper around `repeated Route` because oneof cannot
// contain a bare `repeated` field.
message RouteList {
  repeated Route routes = 1;
}

message WriteConfigResponse {
  // Version of the ConfigSet AFTER the write. On no_op /
  // dry_run / rejected paths, echoes the CURRENT version so the
  // caller's next attempt can use it as parent_version.
  uint64 version = 1;

  // ETag mirrors version for HTTP-cache-style consumers.
  string etag = 2;

  // True when the batch was a structural no-op — every op produced
  // a state proto.Equal to the existing one. Frontend can render
  // a softer "no changes" signal rather than a "saved" toast.
  bool no_op = 3;

  // True when dry_run=true — write was not performed regardless
  // of validation outcome.
  bool dry_run = 4;

  // Validation findings. Populated on INVALID_ARGUMENT (errors)
  // AND on successful writes (warnings — deprecated fields,
  // unused trunks, codec-list narrowing, etc). Frontend renders
  // inline against field paths.
  repeated ConfigDiagnostic diagnostics = 5;

  // Per-resource change summary. Populated on every response —
  // dry_run, successful write, and even no_op (empty). Lets the
  // UI render "what just happened" without a follow-up read.
  ConfigDiff diff = 6;
}

// ConfigDiff is a per-resource change summary spanning every
// resource type the engine knows about. Scales to new resource
// types by adding new ResourceChange.resource_type strings — no
// proto shape change needed.
message ConfigDiff {
  repeated ResourceChange changes = 1;
}

message ResourceChange {
  // Lowercase resource kind: "pipeline", "trunk", "route",
  // future "user", "aor_auth", etc. String rather than enum so
  // adding a new resource type doesn't require a proto bump for
  // every consumer that only renders changes opaquely.
  string resource_type = 1;

  // Stable key (Pipeline.name / Trunk.id). Empty for whole-list
  // replacements (route list) — in that case the resource_type
  // alone tells the consumer what changed.
  string key = 2;

  enum ChangeKind {
    CHANGE_KIND_UNSPECIFIED = 0;
    CHANGE_KIND_ADDED       = 1;
    CHANGE_KIND_MODIFIED    = 2;
    CHANGE_KIND_REMOVED     = 3;
  }
  ChangeKind kind = 3;
}

// =============================================================
// ImportConfig — bulk replace for bootstrap / migration only
// =============================================================
//
// ImportConfig is the ONLY way to push a wholesale OperatorConfig
// blob. It's deliberately separate from WriteConfig because the
// concurrent-edit hazards are different: a routine "save trunk"
// must NOT clobber a sibling operator's parallel route edit, and
// WriteConfig's batched OCC enforces that. ImportConfig
// explicitly replaces the entire ConfigSet — it's meant for
// initial cluster bootstrap (empty configstore + yaml seed) and
// operator-supervised disaster recovery (rolling back to an
// exported snapshot).
//
// Frontend's per-form "Save" handlers MUST NOT call ImportConfig.
// If a frontend tab needs a bulk import path, it goes through a
// dedicated "Import config" operator-gated workflow.

message ImportConfigRequest {
  string         group       = 1;
  OperatorConfig config      = 2;
  string         applied_by  = 3;
  // dry_run: validate + diff against the current ConfigSet
  // without writing.
  bool           dry_run     = 4;
  // parent_version is REQUIRED unless allow_force=true. Routine
  // imports (re-importing from version control) pass the version
  // they last read. Force-import skips OCC — for cluster
  // bootstrap on an empty configstore, OR operator-supervised
  // disaster recovery. Engine logs a high-visibility warning on
  // every force-import.
  uint64         parent_version = 5;
  bool           allow_force    = 6;
}

message ImportConfigResponse {
  uint64                    version     = 1;
  string                    etag        = 2;
  bool                      dry_run     = 3;
  repeated ConfigDiagnostic diagnostics = 4;
  ConfigDiff                diff        = 5;
}

// ConfigDiagnostic — a single validation finding. Frontend renders
// these inline in the constructor UI to flag specific fields.
message ConfigDiagnostic {
  enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_INFO        = 1;
    SEVERITY_WARNING     = 2;
    SEVERITY_ERROR       = 3;
  }
  Severity severity = 1;
  // Human-readable message ("trunk \"phones\" route references
  // unknown pipeline \"customer-survey\"").
  string message = 2;
  // YAML-shaped JSON pointer ("/trunks/phones/codec_allowed/2") so
  // the frontend can highlight the exact offending field. Empty
  // when the diagnostic is global (e.g. "max_concurrent across all
  // trunks exceeds cluster capacity").
  string field_path = 3;
}

// ============================================================
// Trunk — carrier or softphone-facing SIP trunk record
// ============================================================

message Trunk {
  // Operator-chosen identifier (used by Route.trunk references and
  // by sipmeshctl `--trunk <id>`). Required, must be unique within
  // OperatorConfig.trunks.
  string id = 1;

  // Topology selector — see internal/trunkmgr KindRegisterOutbound
  // (default: classic SIP client, REGISTER + UAC), KindPeer (static
  // IP, no REGISTER), KindRegisterInbound (registrar surface for
  // softphones).
  enum Kind {
    KIND_UNSPECIFIED       = 0;
    KIND_REGISTER_OUTBOUND = 1;
    KIND_PEER              = 2;
    KIND_REGISTER_INBOUND  = 3;
  }
  Kind kind = 2;

  // bidirectional / inbound-only / outbound-only. Only meaningful
  // for KIND_PEER (REGISTER kinds are always bidi by definition).
  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    DIRECTION_BOTH        = 1;
    DIRECTION_IN          = 2;
    DIRECTION_OUT         = 3;
  }
  Direction direction = 3;

  // ----- REGISTER_OUTBOUND fields -----
  string host      = 10;
  uint32 port      = 11;
  string user      = 12;
  // pass: write-only on the wire — server scrubs to empty on every
  // GetOperatorConfig response so the frontend doesn't accidentally
  // re-roundtrip cleartext. Frontend re-supplies only when the
  // operator is explicitly editing the credential.
  string pass      = 13;
  string transport = 14;  // "udp" / "tcp" / "tls"
  // Expires lifetime as Go duration string ("3600s", "1h"). Empty
  // = chart/binary default (1h).
  string expires = 15;
  // Override the proxy's SIP_CONTACT_HOST/PORT for this trunk.
  // Empty = use proxy env. Special value "auto" = UPnP-IGD probe
  // (see internal/proxymgr UPnP code).
  string contact_host = 16;
  uint32 contact_port = 17;

  // ----- KIND_PEER fields -----
  repeated TrunkTarget targets = 30;
  TrunkAuth            auth    = 31;

  // ----- KIND_REGISTER_INBOUND fields -----
  string realm = 40;
  // Expiry-bracket clamp for incoming REGISTERs.
  string expires_min = 41;
  string expires_max = 42;
  InboundAuth inbound_auth = 43;
  // For operator-group fan-out (single AOR fans to N registered
  // user instances).
  repeated string operator_group = 44;
  // Outbound routes scoped to this register_inbound (extension dial
  // pattern → upstream trunk).
  repeated InboundOutboundRoute outbound_routes = 45;

  // ----- Common fields -----
  // Codec preference order. Empty = use the caller's offer order.
  repeated string codec_preference = 50;
  // Codec whitelist set. Empty = no filter.
  repeated string codec_allowed = 51;
  // Per-IP-endpoint outbound rate limiting. 0 = unlimited.
  double cps_limit       = 52;
  uint32 max_concurrent  = 53;
  // Source-IP allowlist for inbound matching when the carrier's
  // SBC sits on a different IP than the REGISTER target.
  repeated string allowed_ips = 54;
  // IPv6 vs IPv4 outbound preference.
  repeated string outbound_family_preference = 55;

  // Default From URI for outbound originates dispatched via this
  // trunk. Per-route caller_id wins; per-extension caller_id (on
  // InboundAuthUser) wins over this; this wins over the carrier's
  // own default. Maps to internal/trunkmgr Trunk.OutboundCallerID.
  CallerID outbound_caller_id = 56;

  // Trunk-level dialed-number rewrite applied on outbound originate.
  // Per-route rewrite_dialed (on InboundOutboundRoute / ExtensionRoute
  // / ForwardRoute) is applied first; this stacks AFTER it. Maps to
  // internal/trunkmgr Trunk.OutboundDialedRewrite.
  DialedRewrite outbound_dialed_rewrite = 57;

  // Inbound caller filters — block / allow rules evaluated by the
  // sip-proxy listener before sending 100 Trying. Match the
  // caller's URI user-part (the bare E.164 / extension number)
  // against each filter; on a match the proxy emits the configured
  // SIP response (default 603 Decline) and tears down the
  // transaction with no media reservation, no CDR row.
  //
  // Allowlist semantics: when ANY POLICY_ALLOW filter is present
  // on a trunk, default is deny — only callers matching an
  // allow-policy filter pass through. Pure block-policy filters
  // (no allow) leave the default as accept. Mixed: block rules
  // evaluate first (explicit deny beats implicit allow).
  repeated InboundFilter inbound_filters = 58;
}

// InboundFilter matches a caller URI's user-part and applies a
// policy (block / allow) before the proxy sends 100 Trying. Used
// for per-trunk operator-managed deny lists (spammer numbers,
// obvious scanner extensions like 100/1001) and allowlists
// (campaign-callback-only deployments).
message InboundFilter {
  enum Policy {
    POLICY_UNSPECIFIED = 0;
    POLICY_BLOCK       = 1;  // matched callers rejected
    POLICY_ALLOW       = 2;  // matched callers pass; default-deny when ANY allow present
  }
  Policy policy = 1;

  enum MatchKind {
    MATCH_UNSPECIFIED = 0;
    MATCH_E164_EXACT  = 1;  // exact match on bare E.164 / extension
    MATCH_E164_PREFIX = 2;  // prefix match (e.g. "+1900" blocks all NANP premium-rate)
    MATCH_REGEX       = 3;  // RE2 against the caller URI's user-part
  }
  MatchKind match_kind = 2;
  string    match_value = 3;

  // SIP response status when this filter rejects. 0 = engine
  // default 603 Decline. Engine validates as 4xx / 5xx / 6xx;
  // anything else degrades silently to 603 with a warning log.
  uint32 reject_code = 4;

  // Operator-facing audit note. Surfaced in SIP-trace events +
  // structured filter-match log line. Free-form, <= 256 bytes.
  string reason = 5;
}

message TrunkTarget {
  string host      = 1;
  uint32 port      = 2;
  string transport = 3;
}

message TrunkAuth {
  string user = 1;
  string pass = 2;  // write-only on wire (same scrub-on-read as Trunk.pass)
}

message InboundAuth {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_YAML        = 1;  // operator-supplied user list
    // KIND_LDAP, KIND_OIDC, etc — future plugins
  }
  Kind kind = 1;
  repeated InboundAuthUser users = 2;  // for KIND_YAML
}

message InboundAuthUser {
  string user     = 1;
  string password = 2;  // write-only on wire
  // Optional From-header default for outbound originates this user
  // dials. Override chain: per-route caller_id (on InboundOutboundRoute
  // / Route's delivery target) > THIS > Trunk.outbound_caller_id >
  // carrier default. NOTE: legacy proto had this as `string caller_id`
  // (display-only). Bumped to typed CallerID at field 4 to match the
  // internal CallerIDSpec; field 3 left vacant as deprecated tombstone.
  CallerID caller_id = 4;
  reserved 3;
  reserved "caller_id_legacy";
}

message InboundOutboundRoute {
  RouteMatch match = 1;
  string     trunk = 2;
  // Per-route From-header override for outbound originate. Wins over
  // InboundAuthUser.caller_id and Trunk.outbound_caller_id.
  CallerID caller_id = 3;
  // Per-route dialed-number rewrite. Applied BEFORE Trunk-level
  // outbound_dialed_rewrite; the trunk rewrite stacks on top of
  // this output.
  DialedRewrite rewrite_dialed = 4;
}

// DialedRewrite is a regex-based dialed-number rewrite applied at
// outbound dispatch. match is an RE2 pattern, replace is the substitute
// passed to Go's regexp.ReplaceAllString. Per-route + per-trunk rewrites
// stack: per-route runs first, trunk-level runs on the output.
message DialedRewrite {
  string match   = 1;  // RE2 pattern
  string replace = 2;  // substitute (supports $1, $2 capture refs)
}

// ============================================================
// Route — top-level inbound dispatcher
// ============================================================

message Route {
  RouteMatch match = 1;
  // Exactly ONE of the following 5 must be set. Validated server-
  // side; mutually exclusive in the UI.
  string flow                  = 10;  // edge-side flow name
  string pipeline              = 11;  // pipeline (flow) name from OperatorConfig.pipelines
  ExtensionRoute extension     = 12;
  PeerRoute      peer          = 13;
  ForwardRoute   forward       = 14;
  TransitRoute   transit       = 15;
}

message RouteMatch {
  // Filter by trunk ID — empty string = match all trunks.
  string trunk = 1;
  // Dialed-number patterns. Exactly one of equals / regex / prefix
  // populated; empty match block = catch-all.
  StringMatch dialed = 2;
  // RE2 pattern matched against the FULL caller URI (e.g.
  // "^sip:vip@" to gate VIP routing). Empty = no caller-side filter.
  string caller_regex = 3;
  // Trunk allowlist for sharing one route across multiple trunks
  // without copy-paste. ANDed with `trunk:` (which is normally empty
  // when this is non-empty). Empty = no trunk allowlist filter.
  repeated string allowed_trunks = 4;
}

message StringMatch {
  string equals = 1;
  string regex  = 2;
  string prefix = 3;
}

message ExtensionRoute {
  string target_trunk = 1;  // register_inbound trunk hosting the user
  string user         = 2;  // exact inbound_auth user; rings every
                            // active binding (RFC 5626 multi-device
                            // fanout, #227 fork-race fix).
                            //
                            // Operator-pickup fanout (ring everyone
                            // in a trunk's operator_group) goes
                            // through `Pipeline + DialStep` with
                            // `operator_group_trunk`, NOT through
                            // this route shape — see docs/IDEAS.md
                            // for the rationale and "per-route
                            // operator_group flag" idea kept around
                            // as a possible future shortcut.

  // Field numbers 3..7 reserved for the "per-route extension
  // shortcuts" idea — see docs/IDEAS.md. Today these are not wired
  // through Go (router.ExtensionRouteSpec only has TargetTrunk +
  // User), so the proto would lie about capability if we shipped
  // them. Reserved here so we don't reassign by accident if the
  // shortcuts ever land.
  reserved 3, 4, 5, 6, 7;
  reserved "operator_group", "user_from_dialed", "caller_id",
           "codec_hints", "rewrite_dialed";
}

message PeerRoute {
  string uri          = 1;
  CallerID caller_id  = 2;
  repeated string codec_hints = 3;
}

message ForwardRoute {
  string trunk    = 1;
  string callee   = 2;
  CallerID caller_id = 3;
  // Codec preference hints applied to the outbound leg. Empty = use
  // trunk default.
  repeated string codec_hints = 4;
  // Field 5 reserved — per-route rewrite_dialed isn't wired in Go
  // for forward routes today (Trunk.outbound_dialed_rewrite covers
  // the per-trunk case). See docs/IDEAS.md.
  reserved 5;
  reserved "rewrite_dialed";
}

message TransitRoute {
  string target_trunk = 1;
}

message CallerID {
  string display_name = 1;
  string user         = 2;
  string host         = 3;
}

// ============================================================
// Pipeline — call flow definition (steps composition)
// ============================================================

message Pipeline {
  string name = 1;
  // Wall-clock cap, Go duration string. Empty = inherit
  // edge global MAX_CALL_DURATION.
  string max_call_duration = 2;
  // Per-step list. Discriminated union — exactly one of the inner
  // step fields populated per entry.
  repeated PipelineStep steps = 3;
  // Selects which ai-worker pool the edge routes Synthesize /
  // Transcribe / Chat to for calls flowing through this pipeline.
  // Empty = default pool (legacy single AI_WORKER_ADDR client).
  // Operators wire `label → addr` map on the edge ConfigMap;
  // unknown labels fall back to the default pool with a warn log
  // (degrades gracefully rather than failing the call).
  //
  // Use cases:
  //  - per-tenant pricing tiers: "premium-cloud" → Google Cloud
  //    STT/TTS/Gemini ai-worker; "standard-local" → Vulkan +
  //    Piper + qwen3.5:9b ai-worker; "free-demo" → CPU tiny model.
  //  - per-language pools: route uk_UA pipelines to a pool with
  //    pre-loaded Ukrainian voices, en_US to a different pool.
  //  - A/B: shadow-route some pipelines to a new ai-worker build
  //    without flipping the whole cluster.
  string ai_worker_label = 4;
  // Forces the STT plugin's language detection for calls flowing
  // through this pipeline. Empty (default) = auto-detect. Set when
  // the pipeline serves callers known to speak one specific
  // language and auto-detect on 8 kHz telephony audio is
  // unreliable enough to misclassify (rare on
  // large-v3-turbo-q5_0, common on smaller faster_whisper models
  // like `tiny`/`base`).
  //
  // Format: short ISO 639-1 (`en`, `ru`, `uk`) accepted by every
  // STT backend, or full BCP-47 (`en-US`, `ru-RU`) for backends
  // that prefer it (Google Cloud Speech-to-Text v2). The
  // ai-worker normalizes per-plugin.
  //
  // Replaces the previous WHISPER_LANGUAGE env-var pin (one
  // language per pool, all callers misclassified into it) with
  // per-pipeline opt-in. Pipelines authored without this field
  // inherit auto-detect — the safe default. Sister
  // `ConverseStep.default_language` is the FALLBACK when
  // detection fails; this field, when set, OVERRIDES detection.
  string stt_language = 5;

  // ambience_track is the operator-uploaded background bed mixed
  // under the bot's TTS so calls sound like they originate from a
  // real office (typing, distant chatter, the occasional phone
  // ring). Frontend normalises the upload to 8 kHz mono int16 LE
  // PCM at RMS −20 dBFS with 200 ms cosine loop-boundary fades,
  // then PUTs to S3 and references the resulting `s3://...` URI
  // here. The engine's audio_resolver fetches + caches; the active
  // sender mixes the looped clip into outbound at every frame at
  // a stock −5 dB attenuation plus `ambience_gain_db`. Empty =
  // no ambience (default; current behaviour for every existing
  // pipeline).
  //
  // Stable URIs only: the bytes at this URI are immutable once
  // written. Frontend treats an "update" as upload-then-rebind
  // (new URI, new ambience_clip row), not a mutation on the
  // existing object. The engine's resolver caches per-URI so
  // re-resolves are cheap.
  string ambience_track = 6;

  // ambience_gain_db is the per-pipeline gain offset applied on
  // top of the engine's stock mix gain (−5 dB). Positive makes
  // the bed louder, negative quieter. Default 0.0 = stock mix
  // gain. Engine clamps the final gain to [−40, +6] dB regardless
  // of operator input so a typo can't blast the caller. Ignored
  // when ambience_track is empty.
  double ambience_gain_db = 7;

  // voice_pools_by_language is the per-pipeline TTS voice + bot-
  // persona pool. When non-empty, the engine picks ONE (voice, name)
  // tuple per call at call start, locks it for the call's lifetime,
  // and uses that voice for every TTS clip + substitutes the chosen
  // name into every pipeline text field's `{{bot_name}}` placeholder.
  // Empty = legacy behaviour: ConverseStep / SayStep
  // `voice_by_language` (single string per language) is used and
  // there is no bot_name.
  //
  // Why per-Pipeline (and not per-step): a multi-step pipeline
  // (greeting SayStep → ConverseStep → goodbye SayStep) needs the
  // SAME bot to speak all of it. Voice / name picked once on call
  // start and consistent end-to-end.
  //
  // Keying is the language code (`en`, `ru`, etc — matching the rest
  // of *_by_language conventions). Each language has its own pool;
  // the engine selects per-call based on detected / configured
  // language. A language with an empty pool falls through to the
  // default_language pool; if THAT is empty too, the legacy
  // voice_by_language is consulted.
  //
  // Surfaced 2026-05-15 alongside the *_text_pool_by_language family
  // on ConverseStep (fields 20-25) — same wave of "every operator-
  // facing text/voice surface gains a list-of-variants form so the
  // bot stops sounding identical call-to-call".
  map<string, VoicePool> voice_pools_by_language = 8;

  // stt_alternative_language_codes lets the STT plugin recognise
  // callers who may speak any of several languages. Up to 3 codes
  // (Google Cloud STT limit) on top of the primary `stt_language`
  // (field 5) — STT detects which one each utterance is in and
  // returns the matched code in the transcript. Use cases:
  //   - bilingual lines (en + ru on a CIS-region tenant).
  //   - regional pipelines where the caller's language isn't
  //     known a priori (uk + ru + en on a Ukrainian B2C line).
  //
  // Empty (the safe default) = single-language detection per
  // `stt_language`, or full auto-detect if `stt_language` is also
  // empty.
  //
  // Format mirrors `stt_language`: short ISO 639-1 (`en`, `ru`,
  // `uk`) or BCP-47 (`en-US`, `ru-RU`). The ai-worker normalises
  // per plugin (Google Cloud uses BCP-47; Whisper variants accept
  // either).
  //
  // Operator-facing note: each alternative costs STT latency
  // (Google charges per language attempted). Keep the list small
  // (2-3 entries) for fastest turn-around.
  repeated string stt_alternative_language_codes = 9;

  // stt_session_lock — when true, the engine LOCKS to the first
  // detected language on subsequent transcribes within the same
  // call. The alternative_language_codes are dropped after the
  // first successful detection so following utterances pay
  // single-language STT latency. Recommended on for almost every
  // bilingual pipeline (callers rarely switch languages mid-call;
  // staying locked is faster and lowers misrecognition).
  //
  // false (the default) keeps alternative_language_codes active
  // for every utterance — useful when the caller is expected to
  // code-switch within one call (rare; demos / language-class
  // pipelines).
  bool stt_session_lock = 10;

  // Field numbers 11 + 12 are RESERVED for the AI-disclosure
  // proto pair (DisclosureMode + disclosure_text) — designed in
  // ~/agent-inbox/sipmesh/inbox/2026-05-13-disclosure-mode-frontend-ready.md,
  // deferred 2026-05-15. Do not reuse.

  // barge_in_enabled turns on caller-interrupts-bot detection.
  // When false (default) the bot speaks every TTS clip to
  // completion regardless of caller activity — matches the
  // pre-2026-05-15 behaviour.
  //
  // When true, the engine runs a continuous voice-activity
  // detector on inbound RTP. After `barge_in_voice_ms` of
  // sustained voiced frames (energy above
  // `barge_in_energy_dbfs`), the bot's current playback is
  // interrupted, the FIFO clip queue cleared, and the flow
  // jumps straight into STT capture — fed with a pre-buffered
  // tail of the inbound audio (last `barge_in_pre_buffer_ms`
  // worth of decoded PCM) so the caller's first syllable isn't
  // truncated.
  //
  // Operator-tunable knobs below; defaults pick reasonable
  // values for typical telephony lines.
  bool   barge_in_enabled       = 13;

  // barge_in_voice_ms — milliseconds of sustained voiced frames
  // required to fire the barge-in trigger. Lower = more
  // aggressive (faster reaction but more false positives from
  // background noise / cough). Higher = more robust (caller has
  // to commit to speaking before the bot stops). Default 200 ms
  // when zero. Typical operator range: 150-400 ms.
  uint32 barge_in_voice_ms      = 14;

  // barge_in_energy_dbfs — sample-energy threshold (dBFS) above
  // which a 20 ms frame counts as "voiced" for the
  // voice_ms-of-sustained-voice gate. Lower (more negative,
  // e.g. -55) = picks up quieter speech but also quieter noise.
  // Higher (less negative, e.g. -30) = stricter, only loud
  // sounds register. Default -45 dBFS when zero.
  //
  // This is intentionally a SIMPLE energy gate — operator can
  // tune for their specific line. A future "Pipeline.barge_in_vad_kind"
  // field could route to a more discriminating algorithm
  // (WebRTCVad, etc.) when energy-only false-positives become
  // a real-world problem.
  sint32 barge_in_energy_dbfs   = 15;

  // barge_in_pre_buffer_ms — how many milliseconds of decoded
  // PCM the recv loop keeps in a rolling ring buffer so that on
  // trigger, the audio the caller had ALREADY spoken before the
  // VAD confirmed it's voice can still be fed into STT.
  // Without this, the first ~voice_ms of every barge-in gets
  // swallowed and STT receives "ивет" instead of "привет".
  // Default 300 ms when zero (slightly larger than typical
  // voice_ms to cover the trigger-delay window).
  uint32 barge_in_pre_buffer_ms = 16;

  // barge_in_ack_text_by_language — optional short phrase the
  // bot speaks the moment a barge-in fires, BEFORE transitioning
  // into STT capture ("Yes?", "Listening", "Слушаю"). Gives the
  // caller acoustic confirmation that the interrupt registered
  // so they naturally pause briefly + repeat / continue.
  //
  // Empty per-language entry = no ack; the engine drops
  // straight to Listen on barge-in. Operators who prefer the
  // "barge-in feels instant" UX leave this empty; operators
  // who want explicit interrupt-confirmation set it.
  map<string, string>     barge_in_ack_text_by_language       = 17;

  // barge_in_ack_text_pool_by_language — list-of-variants
  // companion. Engine picks one variant per barge-in occurrence
  // so the bot's "yes?" doesn't sound repetitive across many
  // interrupts. Empty pool falls through to the single-string
  // barge_in_ack_text_by_language.
  map<string, StringList> barge_in_ack_text_pool_by_language  = 18;
}

// VoicePool — the per-language list of voice entries the engine
// randomises across. Wrapped in a message because proto's `map`
// values must be a non-`repeated` type; `repeated` lives inside the
// VoicePool wrapper. One pool per language; the engine picks one
// VoiceEntry from the pool per call.
message VoicePool {
  repeated VoiceEntry entries = 1;
}

// VoiceEntry — one (voice, persona) tuple in the rotation. The
// engine picks an entry at random per call, then a name within the
// entry at random (when names is non-empty) and binds both for the
// call's lifetime. Empty names = bot doesn't introduce itself
// (`{{bot_name}}` substitutes to "").
message VoiceEntry {
  // Voice id (Google Cloud TTS `en-US-Neural2-J`, Piper
  // `en_US-amy-medium`, etc — same string the legacy
  // voice_by_language carried).
  string voice = 1;
  // Operator-facing persona gender, metadata only — engine logs
  // it on the call and surfaces it in transcripts for analytics
  // ("did female-voiced calls convert better"), but no engine
  // behaviour branches on it. "M" / "F" / "" — free-form, the
  // dashboard validates at form time.
  string gender = 2;
  // Name pool for THIS voice. Engine picks one per call and
  // substitutes everywhere `{{bot_name}}` appears in pipeline
  // text fields. Empty list = no persona name; `{{bot_name}}`
  // substitutes to "".
  repeated string names = 3;
}

// StringList — wrapper used by the *_text_pool_by_language family
// on ConverseStep. Same reason VoicePool wraps VoiceEntry: proto
// `map` values cannot themselves be `repeated`. The engine picks
// one string from the list at random per occurrence (per turn for
// fallback / ack_intro / slow_ack / reprompt, per call for
// on_max_turns / unsupported_lang).
message StringList {
  repeated string values = 1;
}

message PipelineStep {
  // Each PipelineStep entry sets exactly ONE of the inner messages.
  // Validated server-side; UI renders one node per entry.
  SayStep      say      = 1;
  ListenStep   listen   = 2;
  ConverseStep converse = 3;
  DialStep     dial     = 4;
  BridgeStep   bridge   = 5;
  HangupStep   hangup   = 6;
  BranchStep   branch   = 7;
  DTMFStep     dtmf     = 8;
  SetCustomFieldStep set_custom_field = 9;
  PauseStep    pause    = 10;
  HoldStep     hold     = 11;
  UnholdStep   unhold   = 12;
  DTMFCollectStep dtmf_collect = 13;
  ReadyForBridgeStep ready_for_bridge = 14;
  PlayFileStep play_file = 15;
  AnswerStep   answer    = 16;
  HTTPCallbackStep http_callback = 17;
  LabelStep    label     = 18;
  GotoStep     goto      = 19;
  RecordStep   record    = 20;
  SubPipelineStep sub_pipeline = 21;
  TransferStep transfer  = 22;
  QueueStep    queue     = 23;
  WhisperStep  whisper   = 24;
  // Add new step kinds here as they land in the engine.
}

message SayStep {
  // Per-language text and voice maps; default_language picks the
  // entry when the call's detected language has no override.
  map<string, string> text_by_language  = 1;
  map<string, string> voice_by_language = 2;
  string default_language               = 3;
}

message ListenStep {
  uint32 endpoint_silence_ms = 1;
  uint32 max_audio_ms        = 2;
  // Optional VAD knobs surfaced to the engine in
  // internal/edgemgr/runner_primitives.go.
}

message ConverseStep {
  map<string, string> system_by_language               = 1;
  map<string, string> voice_by_language                = 2;
  map<string, string> fallback_text_by_language        = 3;
  map<string, string> ack_intro_text_by_language       = 4;
  map<string, string> slow_ack_text_by_language        = 5;
  uint32              slow_ack_after_ms                = 6;
  uint32              slow_ack_repeat_ms               = 7;
  map<string, string> reprompt_text_by_language        = 8;
  map<string, string> on_max_turns_text_by_language    = 9;
  map<string, string> unsupported_lang_text_by_language= 10;
  string              default_language                 = 11;
  uint32              max_turns                        = 12;
  uint32              max_fallbacks                    = 13;
  uint32              max_completion_tokens            = 14;
  uint32              endpoint_silence_ms              = 15;
  string              escape_digit                     = 16;
  bool                interrupt_on_dial_answer         = 17;
  // interrupt_on_custom_field exits the converse loop when the
  // named CustomFields entry is set (regex match against value).
  // Mirrors interrupt_on_dial_answer's pattern but for any
  // external trigger — typical use is queue-with-AI-entertainment
  // where the frontend sets `bridge_partner=<op_call_id>` to
  // unblock the wait while the AI is still chatting. Empty key
  // disables (default).
  ConverseStepInterruptOnCustomField interrupt_on_custom_field = 18;
  // ack_tone is the brief tonal beep the engine plays the moment
  // the caller's utterance endpoints — gives the caller something
  // audible while STT + LLM crunch in the background (typically
  // 1-3 s). Engine-side flowconfig has had this knob since
  // ConverseStep #225; promoted to the proto wire 2026-05-13 so
  // operator dashboards can edit it without going through
  // FLOWS_FILE. Empty (all zero fields) = no tone.
  SineToneSpec ack_tone = 19;

  // *_text_pool_by_language are list-of-variants companions to
  // the corresponding *_text_by_language single-string fields
  // (3, 4, 5, 8, 9, 10). When a pool field is populated for a
  // language, the engine picks one string from the list at random
  // per occurrence — so the bot stops repeating the same exact
  // fallback / ack / re-prompt phrase across turns and across calls.
  //
  // Falls through to the legacy single-string field when the pool
  // is empty for a language (back-compat — existing pipelines
  // keep working unchanged).
  //
  // Pick semantics:
  //   - fallback / ack_intro / slow_ack / reprompt: PER TURN (each
  //     turn that fires it re-rolls the picked variant).
  //   - on_max_turns / unsupported_lang: PER CALL (a call only
  //     ever hits these once, so per-call = per-occurrence).
  //
  // `{{bot_name}}` placeholder substitution applies to every
  // picked variant just like the single-string fields (when the
  // pipeline has a voice_pools_by_language with names defined).
  map<string, StringList> fallback_text_pool_by_language        = 20;
  map<string, StringList> ack_intro_text_pool_by_language       = 21;
  map<string, StringList> slow_ack_text_pool_by_language        = 22;
  map<string, StringList> reprompt_text_pool_by_language        = 23;
  map<string, StringList> on_max_turns_text_pool_by_language    = 24;
  map<string, StringList> unsupported_lang_text_pool_by_language = 25;
}

// SineToneSpec — a single fixed-frequency sine tone. Synthesised
// locally by the edge (no ai-worker round-trip) and pre-encoded for
// the call's codec at flow boot. Reusable for any non-speech audible
// signal — today only ack_tone uses it.
message SineToneSpec {
  // Frequency in Hz. Telephony narrow-band (8 kHz sample rate)
  // tolerates 200-3400 Hz; 800-1000 Hz is the standard "got it"
  // ack frequency operators land on.
  uint32 freq_hz     = 1;
  // Total duration of the tone, milliseconds. Typical: 60-120 ms —
  // long enough to register, short enough not to step on speech.
  uint32 duration_ms = 2;
  // 0.0 .. 1.0 amplitude. 0 = silent (effectively disabled even if
  // duration_ms > 0). 0.2-0.3 is a comfortable level under voice.
  float  volume      = 3;
}

// ConverseStepInterruptOnCustomField — one (key, value_pattern)
// trigger that exits the converse loop. value_pattern is a Go
// regexp; empty pattern matches any non-empty value (a way to say
// "fire as soon as the field is set to anything"). Multiple triggers
// would be a future extension; today one is enough for the
// queue-with-AI scenario.
message ConverseStepInterruptOnCustomField {
  string key           = 1;
  string value_pattern = 2;
}

message DialStep {
  // Discriminated union: exactly ONE of the targeting fields set.
  string operator_group_trunk = 1;
  string trunk                = 2;
  string callee               = 3;
  WaitingPolicy waiting       = 10;
  bool background             = 11;
}

message WaitingPolicy {
  enum Mode {
    MODE_UNSPECIFIED = 0;
    MODE_RINGBACK    = 1;
    MODE_MUSIC       = 2;
    MODE_SILENCE     = 3;
  }
  Mode mode = 1;
  string ringback_region = 2;  // "us", "eu", etc — picks a region-flavored ringback
  string moh_clip        = 3;  // when MODE_MUSIC
}

message BridgeStep {}  // no fields today; placeholder for future tunables

message HangupStep {
  string reason = 1;
}

message BranchStep {
  repeated BranchCase cases   = 1;
  repeated PipelineStep default_steps = 2;
}

message BranchCase {
  // Single-key when expression. "last_dial_status: 200" etc.
  // Frontend renders as a dropdown over known fields + value editor.
  map<string, string> when      = 1;
  repeated PipelineStep   steps = 2;
}

message DTMFStep {
  uint32 timeout_ms = 1;
  uint32 max_digits = 2;
  string terminator = 3;
}

message SetCustomFieldStep {
  string key   = 1;
  // Value supports the engine's variable-substitution
  // ("${last_dtmf}", "${transcript}", etc).
  string value = 2;
}

// HoldStep — engage hold on the current call leg. Edge runtime
// drops bridge-relay output and either pumps a pre-encoded MOH
// clip looped (mode=moh, default) or plays silence (mode=mute).
// The held leg's caller hears music or silence; the other leg
// continues in whatever state it was in (typically the operator
// is doing something else — looking up customer info, asking a
// supervisor, etc). Pair with UnholdStep to release.
//
// Standalone equivalent of WaitingPolicy.MODE_MUSIC, which only
// applies inside a DialStep's ringing window. Use HoldStep when
// you want MOH OUTSIDE of a Dial — e.g. while running an
// HTTPCallback or DatabaseLookup.
message HoldStep {
  enum Mode {
    MODE_UNSPECIFIED = 0;
    MODE_MOH         = 1;  // play music-on-hold (default)
    MODE_MUTE        = 2;  // silence; no playback
  }
  Mode mode = 1;
  // Per-step MOH source override. Resolved against the edge's
  // audio sink in priority order: configured S3 bucket key →
  // local WAV root path → procedural fallback. Empty = use the
  // edge's global MOH (chart's `edge.config.mohWAV` /
  // operator's S3 default key) — same behaviour as before this
  // field existed. Supports `${...}` substitution
  // (`moh_path: "moh/by-language/${detected_language}.wav"`).
  // Only meaningful when mode=MOH; ignored for MODE_MUTE.
  string moh_path = 2;
}

// UnholdStep — release the hold engaged by a previous HoldStep.
// No fields; presence of the step is the signal. Must follow a
// HoldStep on the same leg in the same pipeline (validated at
// parse time).
message UnholdStep {}

// DTMFCollectStep — collect a multi-digit DTMF buffer (vs the
// single-key DTMFStep). Useful for "enter your account number"
// patterns. Stops on terminator key (default '#'), max_digits,
// or inter_digit_timeout_ms whichever fires first. Result lands
// in CallState as `last_dtmf_buffer` for downstream branching.
message DTMFCollectStep {
  uint32 max_digits             = 1;
  uint32 inter_digit_timeout_ms = 2;
  uint32 max_total_ms           = 3;
  string terminator             = 4;  // default "#"
}

// ReadyForBridgeStep — explicit signal that this leg has
// completed pre-bridge prep (greeting / DTMF auth / PIN check)
// and is ready to be bridged with a peer leg. Used by paired
// pipelines: each leg runs its own pre-bridge sequence ending in
// ReadyForBridgeStep, then a controlling actor (proxy / external)
// emits the BridgeStep on whichever side. No fields; positional
// signal only.
message ReadyForBridgeStep {}

// PauseStep — block the pipeline for ms milliseconds with no
// audio output. Inserts a deliberate gap between previous and
// next step (e.g. between a SayStep and a ListenStep so the
// caller has half a second of dead air to start replying instead
// of being cut off mid-syllable). Maps to flow.PauseStep on the
// edge runtime; flowconfig.pauseSchema is the existing YAML
// shape — this proto field exposes it through the typed API.
message PauseStep {
  uint32 ms = 1;
}

// AnswerStep — explicit "send 200 OK now" point in the pipeline.
//
// Today (and for the dev pilot) sip-proxy sends 200 OK
// immediately on inbound INVITE, before the pipeline starts —
// putting AnswerStep anywhere in the steps[] list is a no-op.
//
// Future-state (when proxy gains "deferred answer" mode keyed on
// AnswerStep presence): if AnswerStep appears in the pipeline,
// proxy holds the INVITE in early-media (180/183 with SDP) and
// only sends 200 OK when the pipeline reaches the AnswerStep
// position. That lets a flow play ringback / preroll
// announcements WITHOUT charging the call (carriers bill from
// 200 OK).
//
// Empty body — presence is the signal. Standalone or after a
// PlayFileStep / SayStep ringback is the typical position.
message AnswerStep {}

// PlayFileStep — play a pre-recorded audio file (WAV) to the
// caller. Used for human-recorded greetings / hold music / sting
// effects where TTS is unprofessional or wrong (legal disclaimers,
// branding). Pairs with SayStep (TTS) and ConverseStep
// (interactive TTS) — same audio output channel, different source.
//
// `path` is interpreted relative to the edge's WAV root directory
// (chart-mounted hostPath / ConfigMap volume; operator-side asset
// management). The edge resolves the path at step-execution time
// and reads the WAV file into memory once per step run; small
// files (<10 MB) are cheap to stream. Codec adaptation: if the
// WAV's sample rate or encoding differs from the call's negotiated
// codec, the edge transcodes on the fly via the existing audio
// pipeline (PCMU/PCMA/G.722 supported). Empty path = no-op (step
// is skipped, pipeline continues).
message PlayFileStep {
  // Path relative to the edge WAV root (chart's
  // `WAV_ROOT_DIR` env, default `/etc/sipmesh/wav/`). Examples:
  // "greetings/welcome.wav", "hold/jazz.wav".
  string path = 1;
}

// HTTPCallbackStep — call out to an external HTTP endpoint mid-pipeline
// and (optionally) capture the response body into a CallState custom
// field for downstream BranchStep / SetCustomFieldStep to consume.
// Asterisk-AGI / FreeSWITCH curl_exec equivalent.
//
// Typical uses: CRM lookup by caller number, dynamic-routing decision
// from operator backend, real-time fraud / blacklist check, posting
// CDR fragments to webhooks during the call. Pair with a HoldStep
// before + UnholdStep after when the callout is slow enough to
// notice (>500ms) — caller hears MOH instead of dead air.
//
// Wire-time semantics:
//   - `url` and `body_template` support engine variable substitution
//     ("${caller}", "${last_dtmf}", "${transcript}", "${custom.foo}").
//   - `timeout_ms` capped at 30000 (server-side validation rejects
//     larger). Default 5000.
//   - `response_field` non-empty: response body captured into
//     CallState.CustomFields[response_field] (string, raw body —
//     caller does any JSON parsing in a downstream Branch's
//     `${custom.response_field}` predicate). Empty: response
//     discarded.
//   - `on_error`: CONTINUE = log + skip, FAIL = abort pipeline with
//     error (default). HTTP status outside `expected_status` set is
//     treated as an error.
//   - `expected_status` empty: 200..299 considered success.
message HTTPCallbackStep {
  enum Method {
    METHOD_UNSPECIFIED = 0;
    METHOD_GET         = 1;
    METHOD_POST        = 2;  // default when METHOD_UNSPECIFIED
    METHOD_PUT         = 3;
    METHOD_DELETE      = 4;
    METHOD_PATCH       = 5;
  }
  enum OnError {
    ON_ERROR_UNSPECIFIED = 0;
    ON_ERROR_FAIL        = 1;  // default — abort pipeline on error
    ON_ERROR_CONTINUE    = 2;  // log + skip, pipeline continues
  }
  // Target URL. Supports ${...} substitution. Required.
  string url = 1;
  Method method = 2;
  // Custom request headers (e.g. Authorization, X-Request-ID).
  // Values support ${...} substitution. Content-Type defaults to
  // application/json when body_template is non-empty and the
  // operator hasn't set it explicitly.
  map<string, string> headers = 3;
  // Request body. Supports ${...} substitution. Empty = no body.
  string body_template = 4;
  // Per-call timeout. Capped at 30000ms server-side. 0 = default
  // (5000ms).
  uint32 timeout_ms = 5;
  // CallState.CustomFields key under which to store the response
  // body. Empty = response discarded.
  string response_field = 6;
  OnError on_error = 7;
  // HTTP status codes treated as success. Empty = 200..299.
  // Operators set explicitly when the upstream returns 422 / 404
  // as part of the contract.
  repeated uint32 expected_status = 8;
}

// LabelStep — named target for GotoStep within the same step list.
// Pure positional marker; runtime no-op (consumes zero ms when the
// PC steps over it). Operators sprinkle these throughout a pipeline
// to give GotoStep stable jump destinations that survive step
// reordering / insertion.
//
// Scope: a label is visible only inside the steps[] slice it
// appears in. BranchStep cases are nested step lists with their
// own scope — labels declared inside a case can't be targeted from
// outside the case (and vice versa). The flow runtime validates
// this at parse / build time, before any call routes through the
// pipeline.
//
// Naming: `name` is matched verbatim by GotoStep.label. Empty
// names are rejected at validation; duplicate names within the
// same scope are also rejected.
message LabelStep {
  string name = 1;
}

// RecordStep — capture caller audio to a WAV file. Symmetric with
// PlayFileStep (PlayFile sends, Record receives) — different
// audience, same WAV pipeline. Used for voicemail-style "leave a
// message" flows, IVR audit trails, ML training-data capture, and
// any scenario where the operator needs a per-call durable audio
// artefact beyond the standard whole-call recording.
//
// Output:
//   - File path resolves under the edge's RECORD_DIR (chart's
//     `edge.recordDir`, default `/var/lib/sipmesh/recordings/`).
//     Per-step path is filepath.Clean'd and rejected if it escapes
//     the root (mirrors PlayFileStep's traversal-safe resolution).
//     Empty path = synthesise one from internal_call_id +
//     timestamp + step index.
//   - Format: 16-bit signed linear, 8 kHz mono — same telephony
//     profile as the boot greeting / MOH WAV path. Wideband (G.722
//     16 kHz) downsamples on the way in, matching the existing
//     whole-call recording behaviour.
//   - When the edge's S3 archive sink is configured, the WAV is
//     also uploaded under the same prefix the call's CDR uses.
//
// Endpointing — when the step finishes:
//   - max_duration_ms (required, capped at 600000 = 10 min
//     server-side): hard wall-clock cap, even if the caller keeps
//     talking. Operators MUST set this; "record forever" is never
//     the intent.
//   - silence_endpoint_ms (optional): post-voice silence that
//     trips early endpoint. Empty = no silence detection (record
//     the full max_duration_ms).
//   - dtmf_terminator (optional): single digit ("0"-"9"/"*"/"#")
//     that terminates the recording when the caller presses it.
//     Empty = DTMF doesn't end the recording.
//
// Result lands in CallState.LastRecording — a small struct holding
// the file path + duration + finish reason — for downstream
// SetCustomFieldStep / HTTPCallbackStep consumption (e.g. POST the
// path to a CRM webhook to attach the voicemail to a ticket).
//
// `result_field` (optional) folds the recorded path verbatim into
// CallState.CustomFields under the named key, mirroring
// HTTPCallbackStep's response_field shorthand.
message RecordStep {
  // Path relative to RECORD_DIR. Empty = auto-derive from
  // internal_call_id + step index. Authored paths support
  // ${...} substitution for run-time names like
  // "voicemail/${caller}/${internal_call_id}.wav".
  string path = 1;
  // Hard wall-clock cap. Required (rejected at 0). Server caps
  // at 600000ms (10 min).
  uint32 max_duration_ms = 2;
  // VAD post-voice silence in ms that ends the recording. 0 =
  // disabled (full max_duration_ms).
  uint32 silence_endpoint_ms = 3;
  // Single-digit DTMF that ends the recording (e.g. "#" for
  // "press hash when done"). Empty = no DTMF endpoint.
  string dtmf_terminator = 4;
  // Optional CallState.CustomFields key for the recorded path.
  // Empty = don't write back (LastRecording struct still holds
  // it for downstream steps).
  string result_field = 5;

  // s3_destination — when non-empty, engine uploads the recorded
  // WAV to this S3 URI prefix in addition to the local RECORD_DIR
  // write. Engine appends
  // `<RFC3339-timestamp>_<caller_number>_<call_id>.wav` to the
  // prefix so multiple voicemails per caller don't collide.
  // Reuses the edge's existing s3sink.Client (same bucket / creds
  // the whole-call recording archive already uses). Empty = local
  // write only.
  //
  // Use case: voicemail flow. Operator's frontend / CRM fetches
  // the WAV from S3 (pre-signed URL surfaced via the enriched
  // recording_archived event); local file is GC'd by
  // RECORDINGS_RETENTION_DAYS.
  string s3_destination = 6;

  // transcribe — when true, engine runs the recorded WAV through
  // the call's AIPipe STT plugin after the record completes and
  // attaches the transcript text to the recording_archived event
  // payload. Off by default (STT round-trip adds latency + cost).
  //
  // Use case: voicemail Telegram preview. Frontend doesn't need
  // operators to play the WAV to know who called and why — the
  // transcript drops straight into the chat alongside the audio
  // attachment. STT respects the call's locked language (same
  // path the live ConverseStep uses).
  bool transcribe = 7;

  // outcome — free-form tag tagging WHY this recording was made.
  // Surfaced verbatim on the recording_archived event so
  // downstream consumers (frontend fan-out, analytics, CRM) can
  // route by intent without parsing the recording path. Engine
  // doesn't interpret the value — operator's vocabulary wins.
  //
  // Examples: "voicemail", "feedback", "qa_recording",
  // "intake_summary". Empty = no outcome tag.
  string outcome = 8;

  // emit_sidecar_json — when true, engine writes
  // `<recording_basename>.json` next to the WAV (both locally and
  // in S3 when s3_destination is set). The sidecar carries the
  // full CallState.CustomFields snapshot + call metadata
  // (caller, callee, started/ended timestamps, transcript when
  // transcribe=true) — single-file pickup for offline analysis
  // pipelines that don't subscribe to the meshctl event stream.
  //
  // Opt-in because event-stream consumers (frontend backend
  // already wired) get the same payload over gRPC without the
  // extra disk write.
  bool emit_sidecar_json = 9;
}

// GotoStep — unconditional jump to a LabelStep with matching name
// in the SAME step list. Used for menu-style flows ("press 1 →
// goto sales / press 2 → goto support") and replay loops ("listen
// → if invalid input goto retry"). Composes with BranchStep when
// the jump is gated on a predicate.
//
// Loop guard: the flow runtime caps total step transitions per
// pipeline run (not just gotos). A pipeline that goto-loops
// indefinitely will return an error after the cap fires, instead
// of hanging the call. Operators should pair Goto with
// SetCustomFieldStep + BranchStep to bound retry counts
// explicitly.
//
// Validation: `label` must reference a LabelStep that exists in
// the same scope. Cross-scope jumps (out of a branch case, into
// a sub-pipeline) are not supported in v1 and are rejected at
// parse time.
message GotoStep {
  string label = 1;
}

// TransferStep — hand the caller off to another destination via
// REFER (RFC 3515). After the REFER is accepted (202 from the
// recipient), control of the call moves out of this pipeline —
// typically the flow ends with a HangupStep right after, since the
// caller's UA is now talking to the new target.
//
// Modes:
//   - MODE_BLIND: REFER with bare Refer-To. Recipient drops the
//     existing dialog and INVITEs the target. Default.
//   - MODE_ATTENDED: REFER with Refer-To + Replaces. The transfer
//     replaces an existing peer leg the recipient already has up
//     (typical "operator briefly talked to colleague before
//     transferring caller in" scenario). Requires
//     peer_internal_call_id from a prior DialStep's
//     LastDialResult.
//
// target_uri supports `${...}` substitution against the caller's
// scope (so flow can build dynamic targets from CRM lookups via
// HTTPCallback → SetCustomFieldStep → TransferStep).
//
// Outcome lands on CallState.LastTransferResult — the step layer
// surfaces sip_status + accepted flag for downstream BranchStep
// (e.g. "if blind transfer rejected, fall back to voicemail").
message TransferStep {
  string target_uri = 1;
  enum Mode {
    MODE_UNSPECIFIED = 0;
    MODE_BLIND       = 1;
    MODE_ATTENDED    = 2;
  }
  Mode mode = 2;
  // Peer leg's internal_call_id for MODE_ATTENDED — typically
  // taken from CallState.LastDialResult.InternalCallID (a prior
  // DialStep that established the consult call). Ignored for
  // MODE_BLIND.
  string peer_internal_call_id = 3;
  // Optional CallState.CustomFields key for the resulting SIP
  // status — mirror of HTTPCallbackStep.response_field. Empty =
  // status only lands on LastTransferResult, not in CDR's
  // custom_fields.
  string result_field = 4;
}

// SubPipelineStep — call into a named pipeline as a reusable
// subroutine. Composable replacement for copy-pasting common
// sub-flows (auth gate, business-hours check, voicemail tail) into
// every entry pipeline. The named pipeline runs its full step list
// against the SAME CallState (same caller, same dialog, same
// CustomFields), then control returns to the next step in the
// caller.
//
// Args populate a per-frame template scope visible only inside the
// sub-pipeline:
//
//	${arg.<name>}  → args[name]   (empty when name absent)
//
// They DON'T leak into the parent's substitution scope. Other
// CallState fields (caller, called, custom.<key>, last_dtmf, etc)
// behave normally — the sub-pipeline sees the same call.
//
// Loop guard: each SubPipelineStep call recurses through RunFlow,
// which gets a fresh transition budget (default 10000). Mutual
// recursion via SubPipeline still terminates by exhausting the
// outer caller's budget eventually; pure tail-call recursion across
// pipelines does NOT optimise into a flat loop and burns one
// recursion frame per call.
//
// Validation (parser-time):
//   - `name` must reference a Pipeline that exists in the same
//     OperatorConfig. Cross-config jumps not supported.
//   - Self-reference is allowed but operator must guarantee an
//     escape (BranchStep + counter), same contract as GotoStep
//     loops.
message SubPipelineStep {
  // Pipeline name to invoke. Must match a Pipeline.name in the
  // active OperatorConfig.pipelines.
  string name = 1;
  // Per-call args visible in the sub-pipeline only as
  // ${arg.<key>}. Values support ${...} substitution against the
  // caller's scope (so the caller can pass through its own
  // ${caller}, ${custom.foo}, etc).
  map<string, string> args = 2;
}

// QueueStep — convenience wrapper for "park caller, wait for
// frontend to match an operator, bridge". Engine doesn't track
// queue state — that lives in sipmesh-frontend's DB. This step is
// pure choreography:
//
//   1. Emit `queued` CallEvent with queue_name + caller metadata
//      (frontend's queue-monitor UI sees who's where).
//   2. HoldStep MODE_MOH (caller hears the edge's MOH source).
//   3. Block until CallState.CustomFields[bridge_partner_field] is
//      set (frontend's matching loop pokes via
//      Scheduler.SetCallCustomField when it has a free operator).
//   4. UnholdStep + emit `dequeued` CallEvent.
//   5. Caller's pipeline continues; typical next step is a
//      BridgeStep against ${custom.<bridge_partner_field>}.
//
// On max_wait_ms timeout: emit `queue_timeout` CallEvent +
// fall-through to on_timeout_steps (typically a SubPipelineStep
// to a voicemail flow). Empty on_timeout_steps + timeout = pipeline
// fails closed with a clear "queue timeout" error so the operator
// notices.
//
// Substitution: queue_name supports ${...} so an AI ConverseStep
// can choose the queue based on caller intent (e.g.
// `queue_name: "support-${custom.skill_needed}"`).
//
// AI-entertainment composition: replace this step with
// `ConverseStep { interrupt_on_custom_field: { key: bridge_partner_field } }`
// — same wait semantics, but caller talks to AI while waiting.
// QueueStep is the silent-MOH form; ConverseStep with that
// interrupt is the conversational form. Both consume the same
// frontend matching event; pipeline author picks the experience.
message QueueStep {
  // Logical queue name. Used in CallEvent metadata so
  // frontend matching loop knows which queue to enqueue this
  // caller into. Substitution supported.
  string queue_name = 1;
  // Hard wall-clock cap on the wait. 0 = no cap (wait
  // indefinitely). Operator typically sets this paired with
  // on_timeout_steps for a callback-offer fallback.
  uint32 max_wait_ms = 2;
  // CustomFields key the step blocks on. Empty = "bridge_partner"
  // (default convention). Frontend writes this key via
  // Scheduler.SetCallCustomField when it has a match — pipeline
  // unblocks. After unblock, the caller's NEXT step typically is
  // BridgeStep with peer_internal_call_id = ${custom.<this key>}.
  string bridge_partner_field = 3;
  // Steps to run on max_wait_ms timeout instead of failing
  // closed. Typical use: voicemail / callback-offer SubPipeline.
  repeated PipelineStep on_timeout_steps = 4;
}

// ============================================================
// Read-only resource browse
// ============================================================

message ListTrunksRequest {}
message ListTrunksResponse  { repeated Trunk trunks = 1; }
message GetTrunkRequest     { string id = 1; }

// DescribeTrunk — live health snapshot for one trunk. Reads the
// REGISTER state + bound-UAs count + in-progress-calls count from
// the proxy replica that holds this trunk's registrar lease.
// Returns NotFound when the trunk_id doesn't resolve in the
// active OperatorConfig.
message DescribeTrunkRequest {
  string trunk_id = 1;
}

message DescribeTrunkResponse {
  string trunk_id = 1;
  // "register_outbound" / "peer" / "register_inbound" — lowercase
  // YAML-shape, matches Trunk_Kind enum's lowercased label.
  string kind = 2;

  // Registrar state. register_active is true only for
  // register_outbound trunks whose last REGISTER was 2xx and
  // hasn't expired. Always false for peer / register_inbound.
  bool register_active = 10;
  // RFC 3339 of the last successful REGISTER 2xx. Empty when
  // never seen.
  string last_register_at_iso = 11;
  // Last error from the registrar loop (auth fail, network, 4xx).
  // Empty when current state is success.
  string last_error = 12;
  // True when this proxy replica holds the registrar lease for
  // this trunk in multi-replica deployments. Always true on the
  // single-replica dev pilot.
  bool leader = 13;

  // Currently-REGISTERed UAs count — meaningful for
  // register_inbound only. 0 on peer / register_outbound.
  uint32 inbound_bindings = 20;

  // Calls in progress through this trunk (inbound + outbound).
  // Sourced from the dialog store at the proxy replica that
  // serves this RPC.
  uint32 calls_in_progress = 21;
}

message ListPipelinesRequest {}
message ListPipelinesResponse { repeated Pipeline pipelines = 1; }
message GetPipelineRequest   { string name = 1; }

message ListRoutesRequest {}
message ListRoutesResponse { repeated Route routes = 1; }

// ============================================================
// Calls runtime
// ============================================================

message OriginateCallRequestV2 {
  string callee = 1;
  string trunk  = 2;
  // Pipeline name (from OperatorConfig.pipelines) to run on the
  // outbound leg once the carrier picks up.
  string pipeline = 3;
  repeated string codec_hints = 4;
  // Per-call invite_timeout (Go duration string). Empty = proxy default.
  string invite_timeout = 5;
  // Optional caller-ID override.
  CallerID caller_id = 6;
}

message OriginateCallResponseV2 {
  string internal_call_id = 1;
  uint32 sip_status       = 2;
  string codec            = 3;
}

message ListCallsRequest {
  // Filters applied with AND. All optional.
  string worker     = 1;
  string trunk      = 2;
  string flow       = 3;
  uint32 limit      = 4;
}

message ListCallsResponse {
  repeated CallSummary calls = 1;
}

message CallSummary {
  string internal_call_id  = 1;
  string worker            = 2;
  string caller            = 3;
  string callee            = 4;
  string trunk             = 5;
  string codec             = 6;
  uint32 port              = 7;
  string state             = 8;  // "ringing" / "answered" / "released"
  string flow              = 9;
  string pipeline          = 10;
  string started_at_iso    = 11;
}

message GetCallRequest { string internal_call_id = 1; }
message CallDetail     { CallSummary summary = 1; /* TODO: timeline events, RTP stats */ }

message HangupCallRequest {
  string internal_call_id = 1;
  string reason           = 2;
}
message HangupCallResponse {
  bool   found        = 1;
  string prior_worker = 2;
}

// ============================================================
// Workers
// ============================================================

message ListWorkersRequest {}
message ListWorkersResponse { repeated WorkerSummaryV2 workers = 1; }

message WorkerSummaryV2 {
  string id              = 1;
  string grpc_addr       = 2;
  string rtp_public_ip   = 3;
  string rtp_public_ip_v6= 4;
  uint32 rtp_port_min    = 5;
  uint32 rtp_port_max    = 6;
  uint32 max_concurrent  = 7;
  uint32 active_calls    = 8;
  string version         = 9;
  bool   interop_capable = 10;
  string last_heartbeat_iso = 11;
}

message GetWorkerRequest { string id = 1; }
message WorkerDetail     { WorkerSummaryV2 summary = 1; /* TODO: per-worker active call list */ }

message DrainWorkerRequest  { string id = 1; bool confirm = 2; }
message DrainWorkerResponse { bool ok = 1; }

// ============================================================
// AI worker pools — capability discovery
// ============================================================
//
// Distinct from WorkerSummaryV2 (RTP terminators / media-edge).
// AI workers are gRPC pools that serve Synthesize / Transcribe /
// Chat to media-edge during call processing. Pipelines route to
// them via Pipeline.ai_worker_label.
//
// The dashboard needs to know which pools exist and what each can
// produce (which TTS voices, which LLM models) so the pipeline
// edit form can render correct dropdowns without hardcoding a
// shadow catalog. ai-worker introspects its plugins at startup
// (Piper: enumerate /voices/*.onnx; Google: list API; LLM: from
// config) and reports the result via heartbeat → meshctl's
// registry → ListAIWorkers() returns it to frontend.

message VoiceInfo {
  // id is the voice identifier the operator puts in
  // Pipeline.voice_pools_by_language[lang].entries[].voice.
  // Convention varies per plugin:
  //   Piper:  underscore-style, e.g. "en_US-amy-medium"
  //   Google: dash-style,       e.g. "en-US-Neural2-F"
  string id = 1;
  // language is the BCP-47 tag the voice speaks. Surfaced for
  // dashboard filtering — the frontend groups voices by language
  // before rendering the pool-aware dropdown inside
  // voice_pools_by_language[lang].entries[].
  string language = 2;
  // gender is "F" / "M" / "N" / "" (empty when the plugin doesn't
  // categorise). Optional helper for the dashboard's gender
  // chip / icon.
  string gender = 3;
  // tier is a plugin-specific quality / cost hint:
  //   Google: "Standard" / "Wavenet" / "Neural2" / "Studio" / "Chirp"
  //   Piper:  "low" / "medium" / "high" — model quality variant
  // Empty when the plugin doesn't distinguish. Pure display sugar.
  string tier = 4;
}

message AIWorkerCapability {
  // pool_label matches Pipeline.ai_worker_label that routes
  // gRPC to this worker. Empty string = default pool.
  string pool_label = 1;
  // voices is the full set of voice IDs this worker's TTS plugin
  // can synthesize. Discovered at ai-worker startup by enumerating
  // its plugin (Piper: dir scan; Google: API). Pool entries with
  // the same label MAY share or differ in this set if more than
  // one replica was deployed with different plugin configs —
  // dashboard should union them when rendering, but flag drift.
  repeated VoiceInfo voices = 2;
  // llm_models is the set of LLM model identifiers this worker
  // can serve via Chat / ChatStream. Sourced from the worker's
  // configured plugin (Ollama: model list; OpenAI: configured
  // models; etc.). Optional — empty for TTS-only or STT-only
  // pools.
  repeated string llm_models = 3;
  // max_concurrent is the worker's advertised concurrency cap
  // (same semantics as media-edge WorkerSummaryV2.max_concurrent
  // but per ai-worker pool). Frontend can show pool capacity.
  uint32 max_concurrent = 4;
  // active_workers is the number of pods currently registered
  // under this pool_label (could be > 1 if HPA scaled). Useful
  // for the dashboard's "pool healthy / pool empty" indicator.
  uint32 active_workers = 5;
  // last_heartbeat_iso — most-recent heartbeat across the pool's
  // replicas (RFC3339). Frontend grays out the dropdown entry
  // when stale > N minutes.
  string last_heartbeat_iso = 6;
}

message ListAIWorkersRequest {}
message ListAIWorkersResponse {
  // workers is one entry per pool_label (already aggregated
  // across replicas with the same label). Frontend doesn't see
  // individual pod identity for ai-workers — only the pool's
  // effective capability set.
  repeated AIWorkerCapability workers = 1;
}

// ============================================================
// Events + sip-trace streams
// ============================================================

message SubscribeEventsRequest {
  // Empty = subscribe to all topics. Currently meaningful values:
  // "calls", "config", "trunks", "workers". Future: filter by ID.
  repeated string topics = 1;
}

message Event {
  string topic       = 1;  // "calls" / "config" / "trunks" / "workers"
  string action      = 2;  // "started" / "answered" / "ended" / "applied" / etc
  string subject_id  = 3;  // call_id / trunk_id / config_version / etc
  string detail_json = 4;  // event-specific payload as JSON for forward compat
}

message StreamSipTraceRequest {
  string call_id_filter = 1;  // empty = all calls
  string for_duration   = 2;  // Go duration string; empty = until cancel
}

message SipTraceEvent {
  string call_id    = 1;
  string direction  = 2;  // "inbound" / "outbound"
  string method     = 3;  // "INVITE" / "200" / etc
  string raw        = 4;  // full SIP message bytes (UTF-8 lossy display ok for ops)
  string at_iso     = 5;
}

// ============================================================
// OperatorAPI service — the only public RPC surface
// ============================================================

service OperatorAPI {
  // ----- Config read + write surface -----
  //
  // Read: GetOperatorConfig returns the full config + current version.
  //
  // Write: WriteConfig is the ONLY routine write path. The request
  // carries a batch of ConfigOps (upserts/deletes) plus OCC
  // parent_version; the engine applies the batch atomically, validates
  // the post-merge cross-ref graph, and returns the new version.
  // See WriteConfigRequest for full semantics.
  //
  // Bulk replace (cluster bootstrap, disaster-recovery rollback) goes
  // through ImportConfig — gated behind allow_force and meant for
  // operator-supervised workflows, NOT routine form saves.
  rpc GetOperatorConfig(GetOperatorConfigRequest) returns (OperatorConfigResponse);
  rpc WriteConfig(WriteConfigRequest)             returns (WriteConfigResponse);
  rpc ImportConfig(ImportConfigRequest)           returns (ImportConfigResponse);

  // ----- Per-resource read views -----
  rpc ListTrunks(ListTrunksRequest)       returns (ListTrunksResponse);
  rpc GetTrunk(GetTrunkRequest)           returns (Trunk);
  rpc DescribeTrunk(DescribeTrunkRequest) returns (DescribeTrunkResponse);
  rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
  rpc GetPipeline(GetPipelineRequest)     returns (Pipeline);
  rpc ListRoutes(ListRoutesRequest)       returns (ListRoutesResponse);

  // ----- Calls runtime -----
  rpc OriginateCall(OriginateCallRequestV2) returns (OriginateCallResponseV2);
  rpc ListCalls(ListCallsRequest)           returns (ListCallsResponse);
  rpc GetCall(GetCallRequest)               returns (CallDetail);
  rpc HangupCall(HangupCallRequest)         returns (HangupCallResponse);

  // ----- Workers (media-edge RTP terminators) -----
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
  rpc GetWorker(GetWorkerRequest)     returns (WorkerDetail);
  rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse);

  // ----- AI worker pools (TTS/STT/LLM capability discovery) -----
  // Distinct registry from ListWorkers above (which is RTP edge).
  // Aggregated per pool_label across replicas. Dashboard hits
  // this on pipeline-edit-form load to render correct
  // ai_worker_label + voice_pools_by_language dropdowns from
  // live engine state instead of a hardcoded shadow catalog.
  rpc ListAIWorkers(ListAIWorkersRequest) returns (ListAIWorkersResponse);

  // ----- Streams (server-streaming) -----
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream Event);
  rpc StreamSipTrace(StreamSipTraceRequest)   returns (stream SipTraceEvent);

  // ----- Per-call S3 archive (debug console) -----
  // Per-call artifacts (CDR row, audio recording, SIP wire trace)
  // are written to S3 under deterministic per-call_id prefixes by
  // sipmesh edge + proxy. These RPCs let the frontend browse and
  // fetch them without exposing S3 credentials to the browser.
  rpc ListCallArchive(ListCallArchiveRequest) returns (ListCallArchiveResponse);
  rpc GetCallArtifactURL(GetCallArtifactURLRequest) returns (GetCallArtifactURLResponse);
}

// ListCallArchive returns the calls whose artifacts landed in S3
// on the requested UTC date (the date prefix in the S3 key —
// "the day the artifact was finalized"). Backed by a single
// ListObjectsV2 call against <bucket>/cdr/<yyyy>/<mm>/<dd>/.
// Empty `date` defaults to today's UTC date.
//
// page_token is the NextContinuationToken from S3 — opaque to
// the caller. page_size is best-effort; the server caps at 1000
// (S3 max). For large dates the frontend pages.
//
// FailedPrecondition when S3 archive isn't configured on the
// server (S3_BUCKET unset). The frontend should hide the archive
// view in that case.
message ListCallArchiveRequest {
  // YYYY-MM-DD (UTC). Empty = today.
  string date = 1;
  uint32 page_size = 2;
  string page_token = 3;
}

message ListCallArchiveResponse {
  repeated CallArchiveSummary calls = 1;
  // NextContinuationToken from S3; empty when the listing is
  // complete.
  string next_page_token = 2;
}

// One row per archived call. `call_id` is the internal sipmesh
// call_id used as the S3 key. `started_at` is the call's invite
// time as recorded in the CDR (best-effort — populated when the
// CDR JSON parses; absent for malformed rows). The frontend
// hydrates the rest via GetCallArtifactURL.
message CallArchiveSummary {
  string call_id = 1;
  // RFC 3339 timestamp from the CDR row's TsInvite. Empty when
  // the CDR JSON couldn't be parsed (malformed; the call is
  // still listed).
  string started_at = 2;
  // Bytes of the CDR JSON (small — just the header line). Lets
  // the frontend render the list without paying a second GET
  // per row. Empty when the row was unreadable.
  uint32 cdr_size_bytes = 3;
  // Whether each artifact exists. The frontend grays out the
  // download link when false. RECORDING + SIP_TRACE may legitimately
  // be missing (silent calls / proxy didn't see the dialog), so
  // partial archives are normal — not an error.
  bool has_recording = 4;
  bool has_sip_trace = 5;
}

enum CallArtifactKind {
  CALL_ARTIFACT_UNSPECIFIED = 0;
  CALL_ARTIFACT_CDR         = 1;
  CALL_ARTIFACT_RECORDING   = 2;
  CALL_ARTIFACT_SIP_TRACE   = 3;
}

// GetCallArtifactURL returns a pre-signed S3 GET URL for the
// requested artifact. The URL embeds time-bounded SigV4 creds —
// the browser fetches the artifact directly from S3, no proxy
// through sipmesh. WAVs work as <audio src> with native seek;
// CDR + trace are small enough to fetch as plain text.
//
// `started_at` (RFC 3339) is required because the S3 key is
// date-partitioned. The frontend gets it from the
// CallArchiveSummary returned by ListCallArchive.
//
// NotFound when the object doesn't exist on S3.
// FailedPrecondition when archive isn't configured.
message GetCallArtifactURLRequest {
  string call_id = 1;
  CallArtifactKind kind = 2;
  // RFC 3339; the day-bucket the artifact lives in. UTC.
  string started_at = 3;
  // How long the URL should be valid. Server caps at 1 hour.
  // Default 15 minutes when zero.
  uint32 ttl_seconds = 4;
}

message GetCallArtifactURLResponse {
  string url = 1;
  // RFC 3339 — when the pre-signed URL expires.
  string expires_at = 2;
  // For UI hint ("audio/wav", "application/json", "text/plain").
  string content_type = 3;
}

// ============================================================
// SipmeshConfigSource — boot-pull contract
// ============================================================
//
// The frontend backend implements this service. sipmesh's meshctl
// dials it on boot when SIPMESH_CONFIG_PULL_ADDR is set, asks for
// the active OperatorConfig snapshot for the deployment, and seeds
// its in-process configstore from the response. From that point
// forward Apply pushes drive updates through the normal ConfigSet
// path; meshctl never re-pulls.
//
// Behaviour matrix (sipmesh side):
//
//   SIPMESH_CONFIG_PULL_ADDR set + dial succeeds
//       → seed from response.config (empty config = boot empty,
//         valid initial state for never-applied deployments)
//   SIPMESH_CONFIG_PULL_ADDR set + dial fails / RPC error
//       → fall back to BootstrapDir (operator's safety net for
//         frontend-down scenarios). If BootstrapDir is also empty,
//         meshctl boots empty and waits for a frontend Apply push.
//   SIPMESH_CONFIG_PULL_ADDR unset
//       → standalone mode: BootstrapDir is the only source. This
//         is the dev-laptop / disaster-recovery path that doesn't
//         depend on a frontend backend at all.
//
// Auth model: Bearer token over gRPC, same shape as OperatorAPI's
// auth. The frontend backend authoritatively resolves which
// deployment / tenant the caller represents from the token, so
// the request body carries no tenant_id — that prevents an
// attacker with a leaked token from pulling another tenant's
// config.

service SipmeshConfigSource {
  rpc PullConfigSet(PullConfigSetRequest) returns (PullConfigSetResponse);
}

message PullConfigSetRequest {
  // Optional ConfigSet group name. Empty = "default", which is
  // what every single-deployment install uses today. Non-empty
  // is a forward-looking hook for multi-group deployments — the
  // frontend backend may reject unknown values with
  // InvalidArgument.
  string group = 1;
}

message PullConfigSetResponse {
  // Same typed snapshot ApplyOperatorConfig consumes — Trunks +
  // Routes + Pipelines + version. An empty `config` (no trunks /
  // routes / pipelines) paired with `version: 0` is a valid
  // never-applied response — meshctl boots empty and waits for
  // the first Apply push.
  OperatorConfig config = 1;

  // Echoes the version on the snapshot so meshctl can seed its
  // OCC counter. 0 = empty / never applied. Subsequent
  // ApplyOperatorConfig calls from the frontend pass this value
  // as `parent_version` to win the optimistic-concurrency check.
  uint64 version = 2;
}

// =============================================================================
// WhisperStep — multi-modal "ask the dial-leg operator to confirm
// before bridging" primitive. Runs on the DIAL leg after a
// DialStep has answered; caller stays on hold + MOH on the source
// leg. The bot plays a TTS brief ("Call from Alice about
// billing. Press 1 to accept, # to reject, * to repeat. Or say
// `accept` / `reject` / `repeat`.") then collects DTMF AND voice
// in parallel, first-signal-wins.
//
// Voice path reuses the engine's existing STT + endpoint-VAD +
// barge-in plumbing (already leg-uniform after the May 14-15
// wave) — the operator can interrupt the brief mid-sentence
// ("yes, connect"), the bot stops, STT captures the seed phrase,
// keyword match → accept → BranchStep routes to BridgeStep.
//
// Decisions:
//   - accept  → bridge caller to operator (BranchStep on
//               last_whisper_outcome == "accept")
//   - reject  → drop to voicemail (BranchStep on "reject")
//   - repeat  → replay the brief, up to max_retries times; on
//               retry exhaustion fall through `on_timeout`
//   - timeout → on_timeout default (REJECT — better to voicemail
//               than auto-bridge to a confused operator)
//
// Pipeline author wires the BranchStep against
// CallState.LastWhisperOutcome (engine sets this field to
// "accept" / "reject" / "repeat_exhausted" / "timeout") right
// after the WhisperStep returns.
//
// Phrase matching: lowercase + whitespace-split + first-token-in-
// list match. No fuzzy / LLM / Levenshtein in v1 — pipeline
// author lists every variation operators say in their language
// ("да"/"ага"/"угу"/"yep"/"yes"/"accept"). LLM-intent upgrade is
// future work if keyword path proves clumsy in production.
//
// Per-language phrase lists are SEPARATE from system phrases:
// operators usually do the briefing in the operator's language,
// callers can be in any of the pipeline's languages.
// default_language picks the entry when none matches the locked
// STT detection.
message WhisperStep {
  // text_by_language / text_pool_by_language — TTS brief to play
  // on the dial leg. Pool variants randomise per occurrence so
  // repeated whispers don't sound canned. Substitution supported
  // — typically references CustomFields populated by an earlier
  // ConverseStep's <DONE attrs.../> marker
  // ("Call from {{caller_name}} about {{purpose}}").
  map<string, string>     text_by_language        = 1;
  map<string, StringList> text_pool_by_language   = 2;
  // voice_by_language — optional per-language voice override for
  // the brief. Empty = use the call's locked BotVoice (same RR
  // persona who greeted the caller, played to the operator now).
  // Operators who prefer a neutral "system dispatcher" voice for
  // the brief set this explicitly.
  map<string, string>     voice_by_language       = 3;
  string default_language                         = 4;

  // DTMF acceptance / rejection / repeat digits. Defaults below
  // are the operator-facing convention.
  string accept_digit = 5;  // default "1"
  string reject_digit = 6;  // default "#"
  string repeat_digit = 7;  // default "*"

  // wait_for_response_ms — covers BOTH the DTMF collector AND the
  // post-brief voice-capture window. 0 = engine default
  // (8000 ms — accommodates "operator picks up, says 'allo'
  // first, then hears brief" pattern).
  uint32 wait_for_response_ms = 8;

  enum TimeoutBehavior {
    TIMEOUT_REJECT = 0;  // default — better voicemail than misbridge
    TIMEOUT_ACCEPT = 1;
  }
  TimeoutBehavior on_timeout = 9;

  // Voice path — list of accept/reject/repeat phrases per
  // language. Tokenised lowercase whitespace-split match against
  // STT output. First-frame-wins between DTMF + voice channels.
  // Empty maps = voice path disabled; only DTMF decides.
  map<string, StringList> accept_phrases_by_language = 10;
  map<string, StringList> reject_phrases_by_language = 11;
  map<string, StringList> repeat_phrases_by_language = 12;

  // Retry budget on `repeat` / no-match / low-confidence. Default
  // 1 → 2 total attempts (initial + 1 retry). Exceeded budget +
  // no clear signal → fall through `on_timeout`.
  uint32 max_retries          = 13;

  // voice_confidence_min — STT confidence floor for voice path
  // decisions. Below this we treat the utterance as "didn't
  // catch" and bounce into the retry budget. 0 = engine default
  // (0.6).
  float voice_confidence_min  = 14;
}
